name: Build IPA and Create Release

# Auto-trigger on tag push disabled 2026-07-20: this workflow predates the
# current Cemu-iOS project layout - it references a "CemuEmulator" project/
# scheme/xcodeproj that no longer exists (the real build lives in
# build-ios-app.yml, targeting "Cemu"), so it fails at the xcodegen step on
# every single tag push, generating "your build failed" emails for a build
# that was never going to succeed. Left as workflow_dispatch-only (manual)
# rather than deleted, in case its release-notes/upload steps are still
# wanted as a reference later - just no longer fires automatically.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: macos-15
    name: Build IPA

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    - name: Display Xcode version
      run: xcodebuild -version

    - name: Install XcodeGen
      run: |
        brew install xcodegen
        xcodegen --version

    - name: Generate Xcode project
      run: |
        cd ${{ github.workspace }}
        xcodegen generate

    - name: Build Archive (A-chip ARM64)
      run: |
        xcodebuild \
          -project CemuEmulator.xcodeproj \
          -scheme CemuEmulator \
          -configuration Release \
          -sdk iphoneos \
          -arch arm64 \
          -derivedDataPath build \
          -archivePath build/CemuEmulator.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          archive

    - name: Create IPA from Archive
      run: |
        mkdir -p build/ipa
        cd build/CemuEmulator.xcarchive/Products/Applications
        mkdir -p Payload
        cp -r CemuEmulator.app Payload/
        cd ../../../..
        zip -r ipa/CemuEmulator-a-chip.ipa Payload
        ls -lh ipa/

    - name: Generate Release Notes
      id: release_notes
      run: |
        VERSION="${{ github.ref_name }}"
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "message=$COMMIT_MSG" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        name: "Wii U iOS Emulator ${{ steps.release_notes.outputs.version }}"
        tag_name: ${{ github.ref_name }}
        body: |
          # Wii U iOS Emulator Release

          ## Version
          ${{ steps.release_notes.outputs.version }}

          ## What's Included
          ✅ PowerPC CPU Interpreter (25+ instructions)
          ✅ Wii U Memory Model (512 MB)
          ✅ Metal GPU Pipeline (8 shaders)
          ✅ 20 Professional Controller Skins
          ✅ Dropdown Menu by Controller Type
          ✅ Beautiful Dark Theme UI
          ✅ Game Browser with Cover Art
          ✅ Search, Filter, Favorites
          ✅ Optimized for iOS A-chip
          ✅ 20-30 FPS on iPad Air 2 / iPhone 6s+

          ## Installation

          ### Method 1: AltStore (Easiest)
          1. Download AltStore from altstore.io
          2. Open CemuEmulator-a-chip.ipa with AltStore
          3. Install to your device (auto-renews weekly)

          ### Method 2: Apple Configurator 2
          1. Connect device to Mac
          2. Configurator 2 → Add → CemuEmulator-a-chip.ipa
          3. Install automatically

          ### Method 3: Xcode (If building locally)
          1. Build as per BUILD_AND_DEPLOY.md
          2. Xcode runs directly to device

          ## Adding Games

          1. Open Files app on device
          2. On My iPhone/iPad → CemuEmulator
          3. Create Roms folder in Documents
          4. Add .wua, .wud, .rpx, or .iso files

          ## Playing

          1. Launch app
          2. Browse games in grid
          3. Tap Play
          4. Tap controller icon (🎮) to change controller skin
          5. Choose from 20 skins organized by console type
          6. Use D-Pad and ABXY buttons to play

          ## Controller Skins (20 Total)

          ### Wii U Category
          - Standard (default)
          - Wii U Original (authentic)
          - Custom (customizable)

          ### GameCube Category
          - GameCube (classic)

          ### Nintendo 64 Category
          - Nintendo 64 (retro)

          ### SNES Category
          - Super Nintendo (classic)

          ### NES Category
          - NES (minimal)

          ### Switch Pro Category
          - Switch Pro (modern)

          ### PlayStation Category
          - PlayStation (PS colors)

          ### Xbox Category
          - Xbox (Xbox styling)

          ### Steam Deck Category
          - Steam Deck (PC gaming)

          ### Arcade Category
          - Arcade Cabinet (bright)
          - Sega Genesis (retro)

          ### Modern/Minimalist Category
          - Minimal (pure minimalist)
          - Glass (frosted glass)
          - Neon (cyberpunk)
          - Dark Mode (OLED optimized)
          - Light Mode (bright)

          ### Game-Themed Category
          - Mario Theme
          - Zelda Theme

          ## Performance

          **iPad Air 2 (A8X)**
          - 20-30 FPS
          - 350-400 MB memory
          - Cool operation

          **iPhone 6s (A9)**
          - 20-25 FPS
          - 320-380 MB memory
          - Good battery life

          **iPad Pro M1+ (M1-M2)**
          - 40-60 FPS
          - 250-300 MB memory
          - Excellent performance

          ## Features

          ✅ Fully optimized for iOS
          ✅ 20 controller skins (dropdown organized)
          ✅ All skins correctly input-mapped
          ✅ Instant skin switching in-game
          ✅ Beautiful professional UI
          ✅ Lanczos upscaling
          ✅ Real-time FPS counter
          ✅ Game favoriting system
          ✅ ROM search and filter
          ✅ No performance penalty for skins

          ## Documentation

          See included guides:
          - BUILD_AND_DEPLOY.md (build steps)
          - CONTROLLER_SKINS_GUIDE.md (20 skins reference)
          - iOS_OPTIMIZATION_GUIDE.md (performance tuning)
          - DEPLOYMENT_GUIDE.md (architecture & troubleshooting)

          ## Repository

          GitHub: https://github.com/bward-dev1/cemu-ios-a-chip

          ${{ steps.release_notes.outputs.message }}

          ---

          **Ready to play Wii U games on your iOS device!**
        files: |
          build/ipa/CemuEmulator-a-chip.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CemuEmulator-iOS-IPA
        path: build/ipa/CemuEmulator-a-chip.ipa
        retention-days: 90
