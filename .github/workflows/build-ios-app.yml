name: Build iOS App (M2)

# M2: build the actual Xcode app, linking against the CMake-built CemuCafe/iosgui/
# vcpkg static libs (see src/ios/project.yml + ci/generate-link-flags.sh) instead of
# recompiling ~500 C++ files a second time inside Xcode's own build system, which has
# no dependency-provisioning story of its own.
#
# Manual dispatch only for now — this is new, unverified ground, unlike
# build-ios-core.yml which is our steady-state regression check.

on:
  workflow_dispatch: {}

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-app:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select full Xcode and install build tools
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-path
          brew install xcodegen

      - name: Enable vcpkg GHA binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh"
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Cross-compile dependencies for arm64-ios
        run: |
          "$HOME/vcpkg/vcpkg" install --triplet arm64-ios \
            --x-manifest-root="$GITHUB_WORKSPACE"

      - name: Configure Cemu core for iOS
        run: |
          set -eo pipefail
          cmake -B build-ios -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/cmake/ios.toolchain.cmake" \
            -DVCPKG_TARGET_TRIPLET=arm64-ios \
            -DCMAKE_BUILD_TYPE=Release 2>&1 | tee configure.log

      - name: Build all static libs the app needs
        # CemuCafe links clean on its own (it's a static lib - target_link_libraries
        # dependencies aren't required to physically exist until something actually
        # links them into a final binary), but CemuAudio in particular is never a
        # build prerequisite of CemuCafe/iosgui - it's normally only linked into the
        # desktop CemuBin executable. Build every relevant library explicitly so the
        # Xcode app (which needs the real merged binary) has them all as .a files.
        run: |
          set -eo pipefail
          cmake --build build-ios --target \
            CemuCafe iosgui CemuAudio CemuComponents CemuCommon CemuConfig \
            imguiImpl CemuInput CemuResource CemuUtil \
            2>&1 | tee build.log

      - name: xcodegen generate
        run: |
          cd src/ios
          xcodegen generate

      - name: Build the Cemu iOS app
        run: |
          set -eo pipefail
          cd src/ios
          xcodebuild -project Cemu-iOS.xcodeproj -scheme Cemu -sdk iphoneos \
            -configuration Release CODE_SIGNING_ALLOWED=NO build \
            2>&1 | tee ../../xcodebuild.log

      - name: Upload build logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-build-logs
          path: |
            configure.log
            build.log
            xcodebuild.log
            build-ios/**/*.log
          if-no-files-found: warn
          retention-days: 30
