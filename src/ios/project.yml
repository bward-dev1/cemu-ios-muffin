name: Cemu-iOS

options:
  bundleIdPrefix: com.cemu
  deploymentTarget:
    iOS: '15.0'
  xcodeVersion: '15.0'

settings:
  PRODUCT_NAME: Cemu
  SDKROOT: iphoneos
  IPHONEOS_DEPLOYMENT_TARGET: '15.0'
  CODE_SIGN_IDENTITY: iPhone Developer
  # Neither "c++2a" nor "gnu++20" via CLANG_CXX_LANGUAGE_DIALECT actually took effect
  # (confirmed from the real compiler invocation in CI: still -std=gnu++14 both times).
  # Force it directly as a raw flag instead - this always wins over whatever the
  # dialect setting resolves to. precompiled.h uses std::filesystem (C++17) and
  # enumFlags.h uses a requires-clause (C++20); gnu++20 matches the CMake build.
  CLANG_CXX_LANGUAGE_DIALECT: gnu++20
  OTHER_CPLUSPLUSFLAGS: '-std=gnu++20 $(inherited)'
  GCC_C_LANGUAGE_DIALECT: c99
  # Swift <-> C++ engine bridge (src/ios/Bridge/CemuBridge.{h,mm})
  SWIFT_OBJC_BRIDGING_HEADER: Bridge/Cemu-Bridging-Header.h
  CLANG_ENABLE_MODULES: 'YES'
  # CemuBridge.mm includes real Cemu headers (Cafe/CafeSystem.h -> ... -> rpl.h) that
  # assume Cemu's core type aliases (uint32/sint32/MPTR/...) are already visible via
  # precompiled.h — exactly the iosgui bug from ROADMAP.md M2 (see
  # src/gui/iosgui/CMakeLists.txt's cemu_use_precompiled_header comment), just hit via
  # Xcode's own build instead of CMake. Swift files ignore these settings; only
  # Bridge/CemuBridge.mm is affected.
  GCC_PREFIX_HEADER: '$(SRCROOT)/../Common/precompiled.h'
  GCC_PRECOMPILE_PREFIX_HEADER: 'YES'
  # M1 (ROADMAP.md) is done: the real Cemu core builds via CMake as static libs
  # (libCemuCafe.a, libiosgui.a, ...) scattered across build-ios/ (src/Cafe,
  # src/gui/iosgui, vcpkg_installed/.../lib, dependencies/ih264d, ...). Rather than
  # recompile ~500 C++/Cafe files a second time inside Xcode's own build system
  # (which has no story for providing boost/fmt/curl/etc. — that's what vcpkg solved
  # for the CMake build), this app target LINKS against those already-built
  # libraries. ci/generate-link-flags.sh (run by the preBuildScript below) finds
  # every .a under build-ios/ and lists them by FULL PATH in a linker response file —
  # not -l<name> + LIBRARY_SEARCH_PATHS, since new libs kept turning up in
  # subdirectories not already hand-listed there, each one a fresh "library not
  # found" link failure even though the file existed.
  # CEMU_PLATFORM_IOS was missing here entirely - CemuBridge.mm was silently taking
  # precompiled.h's #elif BOOST_OS_MACOS branch instead of the #if CEMU_PLATFORM_IOS
  # one (boost.predef doesn't distinguish iOS from macOS without this define forcing
  # it, per Common/platform.h's own comment on the same issue). Root cause of the
  # OSSwapInt32/64 "undeclared identifier" errors, and would have silently affected
  # every other CEMU_PLATFORM_IOS-gated branch in the bridge file too.
  # ENABLE_METAL was also missing entirely. Without it, every #if ENABLE_METAL guard
  # in the Cafe source (the Metal renderer selection paths in LatteShaderCache.cpp,
  # etc.) evaluates false, so RendererShaderMtl.h/MetalPipelineCache.h never even get
  # included - matches the CMake build's own -DENABLE_METAL=1 (see top-level
  # CMakeLists.txt: `if (ENABLE_METAL) add_definitions(-DENABLE_METAL=1)`).
  GCC_PREPROCESSOR_DEFINITIONS: 'CEMU_CORE_AVAILABLE=1 CEMU_PLATFORM_IOS=1 ENABLE_METAL=1'
  HEADER_SEARCH_PATHS:
    - '$(SRCROOT)/..'
    - '$(SRCROOT)/../Common/glm_stub'
    - '$(SRCROOT)/../../build-ios/vcpkg_installed/arm64-ios/include'
    - '$(SRCROOT)/../../dependencies/metal-cpp'
  OTHER_LDFLAGS: '@$(SRCROOT)/link-flags.txt $(inherited)'
  # No physical Info.plist exists in this tree and none was ever configured, so the
  # final app-bundling step failed: "Build input file cannot be found: .../Info.plist".
  # GENERATE_INFOPLIST_FILE has modern Xcode synthesize one from build settings.
  GENERATE_INFOPLIST_FILE: 'YES'
  # CFBundleIcons/CFBundleAlternateIcons is a nested dictionary - too complex for the
  # flat INFOPLIST_KEY_<name> scheme GENERATE_INFOPLIST_FILE otherwise handles. Xcode
  # supports merging a small hand-written partial Info.plist alongside the generated
  # one via INFOPLIST_FILE for exactly this case, without disturbing any of the
  # INFOPLIST_KEY_* settings already verified working in the M2 milestone build.
  INFOPLIST_FILE: 'Info-AlternateIcons.plist'
  ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: 'AltIcon-dark AltIcon-happy AltIcon-retro AltIcon-mint-matcha AltIcon-blueberry-blast AltIcon-strawberry AltIcon-double-chocolate AltIcon-lemon-zest AltIcon-neon-cyber AltIcon-pumpkin-spice AltIcon-holiday-frost AltIcon-spooky-halloween AltIcon-rainbow-pride AltIcon-summer-beach AltIcon-galaxy-space AltIcon-progress-pride AltIcon-transgender-pride AltIcon-equality AltIcon-fix-the-world AltIcon-autism-awareness AltIcon-adhd-awareness AltIcon-audhd-awareness AltIcon-disability-pride AltIcon-mental-health-pride AltIcon-lesbian-pride AltIcon-bisexual-pride AltIcon-nonbinary-pride AltIcon-pro-gold-vip AltIcon-pro-holographic AltIcon-pro-diamond-ice'
  MARKETING_VERSION: '0.1.0'
  CURRENT_PROJECT_VERSION: '1'
  INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
  INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
  INFOPLIST_KEY_UISupportedInterfaceOrientations: 'UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
  # GameManager.swift scans Documents/Roms/ for .rpx/.wud/... - without these two
  # keys that folder is sandboxed and invisible to Finder/Files, so there'd be no
  # way to actually get a test RPX onto the device once the app is sideloaded.
  INFOPLIST_KEY_UIFileSharingEnabled: 'YES'
  INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: 'YES'

targets:
  Cemu:
    type: application
    platform: iOS
    deploymentTarget: '15.0'

    sources:
      - path: App
        type: group
      - path: Emulation
        type: group
      - path: Rendering
        type: group
      - path: Bridge
        type: group
      - path: Resources
        type: group

    preBuildScripts:
      - name: Generate Version
        script: |
          echo "Generating version info..."
      - name: Generate linker response file for CMake-built libs
        script: |
          "$SRCROOT/../../ci/generate-link-flags.sh" "$SRCROOT/link-flags.txt"

    scheme:
      gatherCoverageData: false
