name: Cemu-iOS

options:
  bundleIdPrefix: com.cemu
  deploymentTarget:
    iOS: '15.0'
  xcodeVersion: '15.0'

settings:
  PRODUCT_NAME: Cemu
  SDKROOT: iphoneos
  IPHONEOS_DEPLOYMENT_TARGET: '15.0'
  CODE_SIGN_IDENTITY: iPhone Developer
  # "c++2a" isn't recognized by Xcode 16.4's newer dialect naming and silently fell
  # back to gnu++14 (way too old for std::filesystem/C++20 requires-clauses this
  # codebase uses) - confirmed from the actual failing compiler invocation in CI.
  # gnu++20 matches what the CMake build itself already uses successfully.
  CLANG_CXX_LANGUAGE_DIALECT: gnu++20
  GCC_C_LANGUAGE_DIALECT: c99
  # Swift <-> C++ engine bridge (src/ios/Bridge/CemuBridge.{h,mm})
  SWIFT_OBJC_BRIDGING_HEADER: Bridge/Cemu-Bridging-Header.h
  CLANG_ENABLE_MODULES: 'YES'
  # CemuBridge.mm includes real Cemu headers (Cafe/CafeSystem.h -> ... -> rpl.h) that
  # assume Cemu's core type aliases (uint32/sint32/MPTR/...) are already visible via
  # precompiled.h — exactly the iosgui bug from ROADMAP.md M2 (see
  # src/gui/iosgui/CMakeLists.txt's cemu_use_precompiled_header comment), just hit via
  # Xcode's own build instead of CMake. Swift files ignore these settings; only
  # Bridge/CemuBridge.mm is affected.
  GCC_PREFIX_HEADER: '$(SRCROOT)/../Common/precompiled.h'
  GCC_PRECOMPILE_PREFIX_HEADER: 'YES'
  # M1 (ROADMAP.md) is done: the real Cemu core builds via CMake as static libs
  # (libCemuCafe.a, libiosgui.a, ...) under build-ios/, with third-party deps under
  # $VCPKG_ROOT/installed/arm64-ios/lib. Rather than recompile ~500 C++/Cafe files a
  # second time inside Xcode's own build system (which has no story for providing
  # boost/fmt/curl/etc. — that's what vcpkg solved for the CMake build), this app
  # target LINKS against those already-built libraries. See ci/generate-link-flags.sh,
  # run by the preBuildScript below, which turns the CMake build output into
  # OTHER_LDFLAGS via a linker response file (there are ~90 vcpkg libs; hand-listing
  # them in this file would be unmaintainable).
  GCC_PREPROCESSOR_DEFINITIONS: 'CEMU_CORE_AVAILABLE=1'
  HEADER_SEARCH_PATHS:
    - '$(SRCROOT)/..'
    - '$(SRCROOT)/../Common/glm_stub'
    - '$(SRCROOT)/../../build-ios/vcpkg_installed/arm64-ios/include'
    - '$(SRCROOT)/../../dependencies/metal-cpp'
  LIBRARY_SEARCH_PATHS:
    - '$(SRCROOT)/../../build-ios/src/Cafe'
    - '$(SRCROOT)/../../build-ios/src/gui/iosgui'
    - '$(SRCROOT)/../../build-ios/src/Common'
    - '$(SRCROOT)/../../build-ios/src/config'
    - '$(SRCROOT)/../../build-ios/src/input'
    - '$(SRCROOT)/../../build-ios/vcpkg_installed/arm64-ios/lib'
  OTHER_LDFLAGS: '@$(SRCROOT)/link-flags.txt $(inherited)'

targets:
  Cemu:
    type: application
    platform: iOS
    deploymentTarget: '15.0'

    sources:
      - path: App
        type: group
      - path: Emulation
        type: group
      - path: Rendering
        type: group
      - path: Bridge
        type: group

    preBuildScripts:
      - name: Generate Version
        script: |
          echo "Generating version info..."
      - name: Generate linker response file for CMake-built libs
        script: |
          "$SRCROOT/../../ci/generate-link-flags.sh" "$SRCROOT/link-flags.txt"

    scheme:
      gatherCoverageData: false
